name: wog_app
description: WORLD OF GOD Gospel App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # XML ని రీడ్ చేయడానికి ఈ ప్యాకేజీ తప్పనిసరి
  xml: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # మీ XML ఫైల్ పాత్ ని ఇక్కడ రిజిస్టర్ చేయాలి
  assets:
    - assets/telugu_bible.xml

name: Fast Flutter APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This allows you to trigger a build manually!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # SPEEDS UP BUILD: Caches Android dependencies

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # SPEEDS UP BUILD: Caches the Flutter software

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WOG-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk

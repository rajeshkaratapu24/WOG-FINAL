name: WOG Flutter Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4
      - name: Checkout Code
        uses: actions/checkout@v4
      
      # Updated to v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ప్రాజెక్ట్ కి అవసరమైన android, web ఫైల్స్ ఇక్కడే క్రియేట్ అవుతాయి
      - name: Create Platform Folders
        run: flutter create .

      - name: Install Dependencies
        run: flutter pub get
      
      - name: Build Web
        run: flutter build web --release
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Build AAB
        run: flutter build appbundle --release

      # Updated to v4
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: WOG-Web
          path: build/web

      # Updated to v4
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WOG-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # Updated to v4
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: WOG-AAB
          path: build/app/outputs/bundle/release/app-release.aab
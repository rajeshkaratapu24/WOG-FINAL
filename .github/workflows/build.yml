name: WOG Flutter Build & Preview

on:
  push:
    branches: [ "main" ]

# GitHub Pages డిప్లాయ్‌మెంట్ కోసం పర్మిషన్స్
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Java సెటప్
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      # ఫ్లట్టర్ సెటప్
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ఇక్కడే ట్రిక్ ఉంది: మిస్సయిన android, web ఫోల్డర్లని ఇది క్రియేట్ చేస్తుంది
      - name: Create Platform Folders
        run: flutter create .

      - name: Install Dependencies
        run: flutter pub get
      
      # Build Web
      - name: Build Web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
      
      # Build APK
      - name: Build APK
        run: flutter build apk --release
      
      # Build AAB
      - name: Build App Bundle
        run: flutter build appbundle --release

      # APK ఫైల్ అప్‌లోడ్ (డౌన్‌లోడ్ చేసుకోవడానికి)
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: WOG-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
      # AAB ఫైల్ అప్‌లోడ్ (Play Store కోసం)
      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: WOG-AAB
          path: build/app/outputs/bundle/release/app-release.aab

      # Live Preview కోసం GitHub Pages కి పబ్లిష్ చేయడం
      - name: Deploy Web to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web